services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: tienda_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: HOLA123
    ports:
      - "5432:5432"

  web:
    build: .
    restart: always
    command: sh -c "python manage.py collectstatic --noinput && gunicorn Tienda.wsgi:application --bind 0.0.0.0:8000"
    depends_on:
      - db
    environment:
      - SQL_ENGINE=django.db.backends.postgresql
      - SQL_DATABASE=tienda_db
      - SQL_USER=postgres
      - SQL_PASSWORD=HOLA123
      - SQL_HOST=db
      - SQL_PORT=5432
      - DJANGO_ALLOWED_HOSTS=localhost 127.0.0.1 0.0.0.0 3.230.105.9
    volumes:
      - static_volume:/app/staticfiles

  pagos_flask:
    build: ./microservicio_pagos
    restart: always
    ports:
      - "5000:5000"

  nginx:
    image: nginx:1.25-alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/staticfiles
    depends_on:
      - web
      - pagos_flask

volumes:
  static_volume: